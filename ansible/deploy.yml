---
- name: Deploy spring-petclinic to the production VM
  hosts: prod
  become: true
  vars:
    app_dir: /opt/petclinic
    java_dir: /opt/java
    java_bin: /opt/java/openjdk/bin/java
    # jar_src and jdk_src are passed from the Jenkins pipeline (-e ...)
  tasks:
    - name: Create Java directory
      file:
        path: "{{ java_dir }}"
        state: directory
        mode: "0755"

    - name: Ship JDK 17 to the VM (VM has no outbound internet in this env)
      unarchive:
        src: "{{ jdk_src }}"
        dest: "{{ java_dir }}"
        creates: "{{ java_bin }}"

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Copy application jar to the VM
      copy:
        src: "{{ jar_src }}"
        dest: "{{ app_dir }}/app.jar"
        owner: deploy
        group: deploy
        mode: "0644"
      notify: Restart petclinic

    - name: Install systemd unit for petclinic
      copy:
        dest: /etc/systemd/system/petclinic.service
        content: |
          [Unit]
          Description=Spring PetClinic
          After=network.target

          [Service]
          User=deploy
          ExecStart={{ java_bin }} -jar {{ app_dir }}/app.jar --server.port=8080
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Restart petclinic

    - name: Enable and start petclinic
      systemd:
        name: petclinic
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for petclinic to respond on port 8080
      uri:
        url: http://localhost:8080/
        status_code: 200
      register: health
      until: health.status == 200
      retries: 30
      delay: 5

  handlers:
    - name: Restart petclinic
      systemd:
        name: petclinic
        state: restarted
        daemon_reload: true
